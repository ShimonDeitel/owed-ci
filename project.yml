name: Owed
options:
  bundleIdPrefix: com.shimondeitel.owed
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Owed:
    type: application
    platform: iOS
    sources:
      - path: Owed
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.owed
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Owed/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  OwedTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OwedTests
      - path: Owed.storekit
    dependencies:
      - target: Owed
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.owed.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  OwedUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: OwedUITests
    dependencies:
      - target: Owed
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.owed.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Owed:
    build:
      targets:
        Owed: all
        OwedTests: [test]
        OwedUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Owed.storekit
    test:
      config: Debug
      storeKitConfiguration: Owed.storekit
      targets:
        - OwedTests
        - OwedUITests
    archive:
      config: Release
